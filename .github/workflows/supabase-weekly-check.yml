name: Supabase Weekly Check

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Query Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "Missing required secrets: SUPABASE_URL and/or SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi

          endpoint="${SUPABASE_URL%/}/rest/v1/phone_models?select=id&limit=1"
          echo "Checking endpoint: $endpoint"

          status_code=$(curl -sS -o response.json -w "%{http_code}" "$endpoint" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY")

          echo "HTTP status: $status_code"
          echo "Response body:"
          cat response.json

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            echo "Supabase check failed"
            exit 1
          fi
